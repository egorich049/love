<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Міні любовне опитування</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #ff4d6d, #ffb3c1);
    color: white;
    text-align: center;
}

.container {
    padding: 30px;
}

.card {
    background: rgba(0,0,0,0.2);
    padding: 20px;
    border-radius: 20px;
    max-width: 500px;
    margin: auto;
    margin-top: 50px;
}

button {
    padding: 10px 20px;
    margin: 10px;
    border: none;
    border-radius: 15px;
    cursor: pointer;
    font-size: 16px;
}

.btn {
    background: white;
    color: #ff4d6d;
    font-weight: bold;
}

.btn:hover {
    background: #ffe3ea;
}

input {
    padding: 10px;
    border-radius: 10px;
    border: none;
    width: 80%;
}

.error {
    color: yellow;
    margin-top: 10px;
}

.hidden {
    display: none;
}

/* ❤️ HEART */
.final-heart {
    font-size: 100px;
    animation: heartPop 1s ease forwards;
}

@keyframes heartPop {
    0% { transform: scale(0); opacity: 0; }
    60% { transform: scale(1.3); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
}

/* 0 FLOAT */
.zero {
    position: absolute;
    font-size: 28px;
    animation: floatUp 1.2s ease-out forwards;
}

@keyframes floatUp {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-200px); opacity: 0; }
}

/* EXPLOSION */
.explosion {
    position: absolute;
    font-size: 34px;
    animation: explode 0.7s ease forwards;
}

@keyframes explode {
    0% { transform: scale(0.5); opacity: 1; }
    100% { transform: scale(2); opacity: 0; }
}
</style>
</head>

<body>

<div class="container">

<!-- START -->
<div id="start" class="card">
    <h2>Вітаю вас 💖</h2>
    <p>Тут ви пройдете міні любовне опитування від вашого коханого.</p>
    <button class="btn" onclick="startQuiz()">Почати</button>
</div>

<!-- Q1 -->
<div id="q1" class="card hidden">
    <h2>Чи хочете ви отримати поцілуночок? 💋</h2>
    <button class="btn" onclick="answer1('так')">Так</button>
    <button class="btn" onclick="answer1('ні')">Ні</button>
</div>

<!-- Q2 -->
<div id="q2" class="card hidden">
    <h2>Що б ти хотіла від коханого? 💭</h2>
    <input id="wish" placeholder="Відповідь..."/>
    <br>
    <button class="btn" onclick="checkWish()">Далі</button>
    <button class="btn" onclick="skip2()">Пропустити</button>
    <div id="error" class="error"></div>
</div>

<!-- Q3 -->
<div id="q3" class="card hidden">
    <h2>Я тебе люблю ❤️</h2>
    <button class="btn" onclick="answer3('я теж')">Я тебе теж</button>
    <button class="btn" onclick="skip3()">Пропустити</button>
</div>

<!-- RESULT -->
<div id="result" class="card hidden">
    <div id="animation" style="position:relative;height:200px;"></div>

    <h2>Дякуємо 💖</h2>
    <p>Ваші відповіді збережено</p>

    <h3>📩 Результат:</h3>
    <pre id="summary"></pre>
</div>

</div>

<script>
let answers = { q1:null, q2:null, q3:null };

function startQuiz(){
    document.getElementById("start").classList.add("hidden");
    document.getElementById("q1").classList.remove("hidden");
}

function answer1(val){
    answers.q1 = val;
    document.getElementById("q1").classList.add("hidden");
    document.getElementById("q2").classList.remove("hidden");
}

function checkWish(){
    let val = document.getElementById("wish").value.trim();
    let err = document.getElementById("error");

    if(val.toLowerCase() === "не знаю" || val.toLowerCase() === "незнаю"){
        err.innerText = "Подумай ще 💭";
        return;
    }

    answers.q2 = val;
    err.innerText = "";
    nextQ3();
}

function skip2(){
    answers.q2 = "пропущено";
    nextQ3();
}

function nextQ3(){
    document.getElementById("q2").classList.add("hidden");
    document.getElementById("q3").classList.remove("hidden");
}

function answer3(val){
    answers.q3 = val;
    showResult();
}

function skip3(){
    answers.q3 = "пропущено";
    showResult();
}

function showResult(){
    document.getElementById("q3").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    let anim = document.getElementById("animation");
    anim.innerHTML = "";

    // 🔹 STEP 1: 0 летять вгору
    for(let i=0;i<12;i++){
        let zero = document.createElement("div");
        zero.className = "zero";
        zero.innerText = "0";
        zero.style.left = Math.random()*90 + "%";
        zero.style.top = "120px";
        anim.appendChild(zero);
    }

    // 🔹 STEP 2: вибух
    setTimeout(() => {
        anim.innerHTML = "";

        for(let i=0;i<18;i++){
            let boom = document.createElement("div");
            boom.className = "explosion";
            boom.innerText = "0";
            boom.style.left = Math.random()*90 + "%";
            boom.style.top = Math.random()*120 + "px";
            anim.appendChild(boom);
        }
    }, 1200);

    // 🔹 STEP 3: серце
    setTimeout(() => {
        anim.innerHTML = "<div class='final-heart'>💖</div>";
    }, 2000);

    let text =
`1) Поцілунок: ${answers.q1}
2) Бажання: ${answers.q2}
3) Любов: ${answers.q3}`;

    document.getElementById("summary").innerText = text;
    localStorage.setItem("loveQuiz", text);
}
</script>

</body>
</html>
